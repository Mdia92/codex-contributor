<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} · Codex Contributor</title>
  <style>
    :root { --ink:#142033; --muted:#68758a; --line:#dfe5ee; --paper:#fff; --wash:#f4f7fb; --blue:#2c5cb8; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--wash); color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
    .page { max-width:920px; margin:0 auto; padding:56px 28px 72px; }
    .masthead { background:linear-gradient(135deg,#101827,#294a82); color:#fff; border-radius:22px; padding:42px 46px; box-shadow:0 18px 42px rgba(23,42,76,.18); }
    .overline { text-transform:uppercase; letter-spacing:.18em; font-size:11px; font-weight:800; color:#a9c4f6; }
    h1 { font-family:Georgia,"Times New Roman",serif; font-weight:500; font-size:42px; letter-spacing:-.02em; margin:10px 0 0; }
    .rule { height:1px; background:rgba(255,255,255,.24); margin-top:26px; }
    .sections { display:grid; gap:14px; margin-top:22px; }
    .section-card { background:var(--paper); border:1px solid var(--line); border-radius:15px; padding:24px 28px; box-shadow:0 5px 18px rgba(35,55,90,.05); }
    .confidence-card { border-color:#9bb9ed; background:#fafdff; }
    .section-kicker { color:var(--blue); font-size:12px; font-weight:850; letter-spacing:.12em; text-transform:uppercase; margin-bottom:10px; }
    .section-body { font-family:Georgia,"Times New Roman",serif; font-size:17px; line-height:1.68; }
    .section-body p { margin:0 0 10px; }
    .section-body p:last-child { margin-bottom:0; }
    code { color:#214c9a; background:#edf3ff; padding:2px 6px; border-radius:5px; font-family:ui-monospace,SFMono-Regular,Consolas,monospace; font-size:.88em; }
    li { margin:6px 0; }
    footer { color:var(--muted); font-size:12px; margin-top:22px; text-align:center; }
    @media print { body { background:#fff; } .page { padding:0; } .masthead { box-shadow:none; } .section-card { break-inside:avoid; box-shadow:none; } }
  </style>
</head>
<body><main class="page">
  <header class="masthead"><div class="overline">Codex Contributor · Engineering artifact</div><h1>{{TITLE}}</h1><div class="rule"></div></header>
  <div class="sections">{{SECTIONS}}</div>
  <footer>Evidence before implementation · Generated by Codex Contributor</footer>
</main></body>
</html>
